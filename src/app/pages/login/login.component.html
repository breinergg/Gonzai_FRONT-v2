<div class="login-wrapper" [class.leaving]="isLeaving">

  <!-- LEFT PANEL -->
  <div class="left-panel" id="bg-left">
    <div class="left-grid"></div>
    <div class="left-content">
      <div class="left-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <path d="M24 8L38 18V36H30V28H18V36H10V18L24 8Z" fill="white"/>
        </svg>
      </div>
      <h2>Bienvenido a Gonzai</h2>
      <p>“La inteligencia que impulsa tu tienda”</p>

    </div>
    <div class="left-footer">
      <p>&copy; 2026 Gonzai &nbsp;·&nbsp; <span class="footer-dev">Desarrollado por Breiner Gonzalez Machado</span></p>
    </div>
  </div>


  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="form-box">

      <div class="form-header">
        <div class="mobile-logo">
          <img src="/gonzai logo.png" alt="Gonzai" width="88" height="88" />
        </div>
        <div class="form-title-row">
          <h1>Iniciar Sesi&oacute;n</h1>
        </div>
        <p class="subtitle">Ingresa tus credenciales para acceder a tu cuenta.</p>
      </div>

      <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)" autocomplete="off" novalidate>

        <div class="field-group">
          <label for="email">Correo electr&oacute;nico</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              id="email"
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="tu&#64;correo.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="field-group">
          <div class="label-row">
            <label for="password">Contrase&ntilde;a</label>
            <a href="#" class="forgot">&#191;Olvidaste tu contrase&ntilde;a?</a>
          </div>
          <div class="input-wrap pwd-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              [(ngModel)]="password"
              placeholder="Ingresa tu contrase&ntilde;a"
              autocomplete="current-password"
              required
            />
            <button type="button" class="eye-btn" (click)="togglePassword()" aria-label="Toggle password visibility">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20C7 20 2.73 16.18 1 12c.74-1.9 1.97-3.56 3.5-4.84M6.53 6.53A9.93 9.93 0 0112 4c5 0 9.27 3.82 11 8a10.09 10.09 0 01-1.64 2.89"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="error-msg" *ngIf="errorMessage">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-signin" [disabled]="isLoading">
          <span *ngIf="!isLoading">Iniciar Sesi&oacute;n</span>
          <span *ngIf="isLoading" class="btn-loading">Verificando...</span>
          <svg *ngIf="!isLoading" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

      </form>


    </div>
  </div>

  <!-- MOBILE FOOTER (solo visible en móvil) -->
  <div class="mobile-footer">
    <p>&copy; 2026 Gonzai &nbsp;&middot;&nbsp; <span class="footer-dev">Desarrollado por Breiner Gonz&aacute;lez Machado</span></p>
  </div>

</div>
